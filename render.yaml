services:
  - type: web
    name: esamz-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SERPER_API_KEY
        sync: false
      - key: KV_REST_API_URL
        sync: false
      - key: KV_REST_API_TOKEN
        sync: false
      - key: PRIVACY_MODE
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: RUST_LOG
        value: esamz=info,tower_http=warn
