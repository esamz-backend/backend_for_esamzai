services:
  - type: web
    name: esamz-backend
    runtime: rust
    plan: free
    buildCommand: cargo build --release
    startCommand: ./target/release/esamz
    healthCheckPath: /health

    envVars:
      - key: SERPER_API_KEY
        sync: false

      - key: WIKIPEDIA_USER_AGENT
        value: "eSAMz-AI/1.0 (https://esamz.ai; contact@esamz.ai)"

      - key: KV_REST_API_URL
        sync: false

      - key: KV_REST_API_TOKEN
        sync: false

      - key: PRIVACY_MODE
        value: "false"

      - key: ENVIRONMENT
        value: production

      - key: RUST_LOG
        value: esamz=info,tower_http=warn
